<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    
    <!-- Text Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="800" height="200" rx="16" fill="url(#bg-grad)" />

  <!-- Decorative grid lines or shapes for modern aesthetic -->
  <g opacity="0.1">
    <circle cx="80" cy="100" r="120" fill="none" stroke="#fff" stroke-width="1" />
    <circle cx="720" cy="100" r="120" fill="none" stroke="#fff" stroke-width="1" />
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="0.5" />
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="0.5" />
  </g>

  <!-- Main Name Text (Outlined / Glowing) -->
  <text x="50%" y="115" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="56" 
        font-weight="900" 
        letter-spacing="10" 
        fill="none" 
        stroke="url(#text-grad)" 
        stroke-width="2.5" 
        text-anchor="middle"
        filter="url(#glow)">
    PRINS MISHRA
  </text>

  <!-- Subtitle Text -->
  <text x="50%" y="155" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="14" 
        font-weight="600" 
        letter-spacing="4" 
        fill="#94a3b8" 
        text-anchor="middle">
    SOFTWARE ENGINEER • FULL-STACK DEVELOPER
  </text>
</svg>
